name: honey
description: "Honey — A productivity app with Pomodoro timer and virtual pet."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Navigation
  go_router: ^13.2.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Animation
  flutter_animate: ^4.2.0
  
  # Design & Fonts
  google_fonts: ^6.1.0
  
  # Charts
  fl_chart: ^0.64.0
  
  # Audio
  audioplayers: ^6.1.0
  
  # Notifications
  flutter_local_notifications: ^17.1.0
  
  # Permissions
  permission_handler: ^11.4.0
  
  # App Usage (for statistics)
  app_usage: ^4.1.0

  # App Blocking (open Android settings / bring app to foreground)
  android_intent_plus: ^6.0.0

  # Utilities
  uuid: ^4.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  
  # Code Generation
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  
  # Linting
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/pet/
    - assets/animations/
    - assets/audio/
