name: honey_app
description: Honey - Productivity App with Pomodoro Timer and Virtual Pet
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.4.1
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^13.2.0

  # Local Storage
  hive_flutter: ^1.1.0

  # Animation & UI
  flutter_animate: ^4.4.0
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  lottie: ^3.1.2

  # Audio & Notifications
  audioplayers: ^5.2.1
  flutter_local_notifications: ^17.1.2

  # Utilities
  permission_handler: ^12.0.3
  app_usage: ^4.1.0
  uuid: ^4.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  
  # Riverpod Codegen
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.6

  # Hive Codegen
  hive_generator: ^2.0.1

  # Custom Linting
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/animations/

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlayfairDisplay-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700

    
